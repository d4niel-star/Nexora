services:
  - type: web
    name: nexora
    runtime: node
    repo: https://github.com/d4niel-star/Nexora
    branch: main
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/system/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        fromDatabase:
          name: nexora-db
          property: connectionString
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: NEXT_PUBLIC_ROOT_DOMAIN
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false

databases:
  - name: nexora-db
    plan: free
    databaseName: nexora
