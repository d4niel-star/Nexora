services:
  - type: web
    name: nexora
    runtime: node
    repo: https://github.com/d4niel-star/Nexora
    branch: main
    buildCommand: npm install && npm run build
    # Bind Next.js to all interfaces on Render's $PORT.
    # -H 0.0.0.0 is required for Render's port scanner to detect the listener.
    # Next respects $PORT from env automatically.
    startCommand: npx next start -H 0.0.0.0 -p $PORT
    healthCheckPath: /api/system/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        fromDatabase:
          name: nexora-db
          property: connectionString
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: NEXT_PUBLIC_ROOT_DOMAIN
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false

  - type: cron
    name: nexora-ads-sync
    runtime: node
    repo: https://github.com/d4niel-star/Nexora
    branch: main
    schedule: "0 2 * * *" # Run at 2:00 AM every day
    buildCommand: echo "no build required for cron"
    startCommand: "curl -fsSL -H \"Authorization: Bearer $CRON_SECRET\" $NEXT_PUBLIC_APP_URL/api/ads/sync"
    envVars:
      - key: CRON_SECRET
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false

  # Recovery email for abandoned carts. The endpoint hard-caps each
  # batch internally and is idempotent (one email per cart, by
  # eventType+entityId) so running every 30 min is safe even if a tick
  # is missed or duplicated.
  - type: cron
    name: nexora-cron-abandoned-carts
    runtime: node
    repo: https://github.com/d4niel-star/Nexora
    branch: main
    schedule: "*/30 * * * *"
    buildCommand: echo "no build required for cron"
    startCommand: "curl -fsSL -X POST -H \"x-cron-secret: $CRON_SECRET\" $NEXT_PUBLIC_APP_URL/api/cron/abandoned-carts"
    envVars:
      - key: CRON_SECRET
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false

  # Pickup reservations expire after the per-store TTL. The endpoint is
  # idempotent (only flips reservations whose expiresAt has passed) so a
  # 30-min cadence is enough; running more often would just make
  # SystemEvent rows noisier without changing outcomes.
  - type: cron
    name: nexora-cron-pickup-expire
    runtime: node
    repo: https://github.com/d4niel-star/Nexora
    branch: main
    schedule: "*/30 * * * *"
    buildCommand: echo "no build required for cron"
    startCommand: "curl -fsSL -X POST -H \"x-cron-secret: $CRON_SECRET\" $NEXT_PUBLIC_APP_URL/api/cron/expire-pickup-reservations"
    envVars:
      - key: CRON_SECRET
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false

  # Dunning reminders for overdue subscriptions. Hourly is plenty — the
  # endpoint reads `nextRetryAt` so it self-throttles and never sends
  # twice for the same cycle.
  - type: cron
    name: nexora-cron-dunning
    runtime: node
    repo: https://github.com/d4niel-star/Nexora
    branch: main
    schedule: "0 * * * *"
    buildCommand: echo "no build required for cron"
    startCommand: "curl -fsSL -X POST -H \"x-cron-secret: $CRON_SECRET\" $NEXT_PUBLIC_APP_URL/api/cron/dunning-reminders"
    envVars:
      - key: CRON_SECRET
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false

  # Post-purchase review request emails (V2.5 app). Daily is enough — the
  # endpoint enforces the per-store delay window and is idempotent via
  # EmailLog.
  - type: cron
    name: nexora-cron-post-purchase
    runtime: node
    repo: https://github.com/d4niel-star/Nexora
    branch: main
    schedule: "0 13 * * *" # 13:00 UTC ≈ 10:00 AR
    buildCommand: echo "no build required for cron"
    startCommand: "curl -fsSL -X POST -H \"x-cron-secret: $CRON_SECRET\" $NEXT_PUBLIC_APP_URL/api/cron/post-purchase-review-requests"
    envVars:
      - key: CRON_SECRET
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false

databases:
  - name: nexora-db
    plan: free
    databaseName: nexora
